# Netlify configuration for Life Tracker frontend
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm ci --include=dev && node scripts/build-frontend.js"
  publish = "dist-frontend"

  [build.environment]
    NODE_VERSION = "20"
    NODE_ENV = "production"

# ── Redirect rules ────────────────────────────────────────────────────────────
[[redirects]]
  from = "/remotes/*"
  to = "/remotes/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Headers ───────────────────────────────────────────────────────────────────
[[headers]]
  for = "/remotes/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
