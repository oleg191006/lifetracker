# Netlify configuration for Life Tracker frontend
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Build command — runs the unified frontend build script
  command = "node scripts/build-frontend.js"

  # Directory to deploy (output of build-frontend.js)
  publish = "dist-frontend"

  # Node.js version
  environment = { NODE_VERSION = "20" }

# ── Environment variables ─────────────────────────────────────────────────────
# Set these in Netlify → Site settings → Environment variables:
#
#   API_URL       = https://your-api-name.up.railway.app
#   NODE_ENV      = production
#
# Do NOT put secrets here — this file is committed to git.

# ── Redirect rules ────────────────────────────────────────────────────────────
# These are defined here AND written to dist-frontend/_redirects by the build
# script (belt-and-suspenders approach).

# Remote static files — served as-is (200 passthrough)
[[redirects]]
  from = "/remotes/*"
  to = "/remotes/:splat"
  status = 200

# SPA fallback — all other routes serve index.html so React Router works
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Headers ───────────────────────────────────────────────────────────────────
# Allow Module Federation remote entry files to be fetched cross-origin
# (needed if you ever host remotes on a different domain).
[[headers]]
  for = "/remotes/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=31536000, immutable"

# HTML — no cache (always serve fresh)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS/CSS bundles with content hash — long cache
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
